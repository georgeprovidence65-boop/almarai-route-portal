<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almarai QR Code</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f8f2;
      color: #15212d;
      display: grid;
      font-family: Arial, Helvetica, sans-serif;
      padding: 18px;
      place-items: center;
    }
    main {
      background: white;
      border: 1px solid #d7e1e8;
      border-radius: 18px;
      box-shadow: 0 18px 42px rgba(0, 64, 33, 0.12);
      padding: 20px;
      text-align: center;
      width: min(460px, 100%);
    }
    h1 { margin: 0 0 14px; font-size: 24px; letter-spacing: 0; }
    img {
      background: white;
      border: 1px solid #d7e1e8;
      border-radius: 12px;
      height: min(320px, 90vw);
      padding: 12px;
      width: min(320px, 90vw);
    }
    .url {
      background: #f0f4ff;
      border-radius: 8px;
      color: #123fbd;
      font-size: 14px;
      line-height: 1.45;
      margin-top: 14px;
      overflow-wrap: anywhere;
      padding: 10px;
    }
    .actions { display: flex; gap: 8px; margin-top: 14px; }
    button, a {
      background: #08783a;
      border: 0;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      flex: 1;
      font: inherit;
      font-weight: 700;
      min-height: 40px;
      padding: 10px;
      text-decoration: none;
    }
    a { background: #123fbd; }
  </style>
</head>
<body>
  <main>
    <h1 id="title">QR Code</h1>
    <img id="qr" alt="QR code">
    <div id="url" class="url"></div>
    <div class="actions">
      <button type="button" onclick="window.print()">Print</button>
      <a id="openLink" href="#">Open</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const data = params.get('data') || window.location.origin;
    const title = params.get('title') || 'Almarai QR Code';

    document.getElementById('title').textContent = title;
    document.getElementById('url').textContent = data;
    document.getElementById('openLink').href = data;
    document.getElementById('qr').src = `${window.location.origin}/qr-png?data=${encodeURIComponent(data)}`;
  </script>
</body>
</html>
